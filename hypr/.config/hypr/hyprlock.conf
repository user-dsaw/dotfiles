background {
    monitor =
    path = ~/Pictures/Wallpapers/lady.png
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(212, 175, 55, 1.0)
    font_size = 72
    font_family = AnonymicePro Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(212, 175, 55, 0.8)
    font_size = 18
    font_family = AnonymicePro Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgba(212, 175, 55, 0.8)
    inner_color = rgba(13, 13, 15, 0.9)
    font_color = rgba(212, 175, 55, 1.0)
    fade_on_empty = true
    placeholder_text = <i>password...</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:5000] echo "$(cat /sys/class/power_supply/BAT0/capacity)% 󰁹"
    color = rgba(212, 175, 55, 0.7)
    font_size = 20
    font_family = AnonymicePro Nerd Font
    position = 0, -170
    halign = center
    valign = center
}

label {
    monitor =
    text = Welcome back, Ayame
    color = rgba(212, 175, 55, 0.6)
    font_size = 15
    font_family = AnonymicePro Nerd Font
    position = 0, 50
    halign = center
    valign = center
}